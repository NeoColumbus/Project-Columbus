<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600" role="img" aria-labelledby="title desc">
  <title id="title">Drop 001 Sticker Sheet</title>
  <desc id="desc">A sticker sheet for Full City Columbus with signal marks and short civic lines.</desc>
  <rect width="1200" height="1600" fill="#F6F0E4"/>
  <text x="70" y="112" fill="#050606" font-family="Arial Black, Impact, sans-serif" font-size="48" letter-spacing="5">DROP 001 STICKERS / SECOND GEOMETRY</text>

  <g transform="translate(250 330)">
    <circle r="150" fill="#061620"/>
    <path d="M-150 0h300M0-150v300" stroke="#E8DDC7" stroke-width="14"/>
    <path d="M-150 0h300M0-150v300" stroke="#B77836" stroke-width="5"/>
    <circle r="92" fill="#E8DDC7"/>
    <circle r="70" fill="#061620"/>
    <circle r="38" fill="none" stroke="#E8DDC7" stroke-width="14"/>
    <circle r="20" fill="#F4B037"/>
  </g>
  <g transform="translate(600 330)">
    <circle r="150" fill="#F4B037"/>
    <text x="-92" y="-10" fill="#050606" font-family="Impact, Arial Black, sans-serif" font-size="74">POST</text>
    <text x="-92" y="62" fill="#050606" font-family="Impact, Arial Black, sans-serif" font-size="74">THE</text>
    <text x="-92" y="134" fill="#050606" font-family="Impact, Arial Black, sans-serif" font-size="74">SIGNAL</text>
  </g>
  <g transform="translate(950 330)">
    <circle r="150" fill="#9D4732"/>
    <text x="-98" y="-18" fill="#F6F0E4" font-family="Impact, Arial Black, sans-serif" font-size="80">OLD</text>
    <text x="-98" y="58" fill="#F6F0E4" font-family="Impact, Arial Black, sans-serif" font-size="80">PLACE</text>
    <text x="-98" y="132" fill="#F4B037" font-family="Impact, Arial Black, sans-serif" font-size="74">NEW BODY</text>
  </g>

  <g transform="translate(70 590)">
    <rect width="500" height="210" rx="24" fill="#061620"/>
    <path d="M0 105h500M250 0v210" stroke="#E8DDC7" stroke-width="10"/>
    <circle cx="250" cy="105" r="58" fill="#E8DDC7"/>
    <circle cx="250" cy="105" r="36" fill="#061620"/>
    <circle cx="250" cy="105" r="16" fill="#F4B037"/>
    <text x="30" y="176" fill="#F4B037" font-family="Arial Black, Impact, sans-serif" font-size="34" letter-spacing="3">THE NEXT CITY IS US</text>
  </g>
  <g transform="translate(630 590)">
    <rect width="500" height="210" rx="24" fill="#E8DDC7" stroke="#050606" stroke-width="8"/>
    <text x="30" y="86" fill="#050606" font-family="Impact, Arial Black, sans-serif" font-size="68">NO MORE</text>
    <text x="30" y="154" fill="#9D4732" font-family="Impact, Arial Black, sans-serif" font-size="72">HALF-CITY</text>
  </g>

  <g transform="translate(70 860)">
    <rect width="1060" height="210" rx="24" fill="#F4B037"/>
    <text x="34" y="90" fill="#050606" font-family="Impact, Arial Black, sans-serif" font-size="76">THE EARTHWORKS WERE FIRST.</text>
    <text x="34" y="166" fill="#050606" font-family="Impact, Arial Black, sans-serif" font-size="76">THE NEXT CITY IS US.</text>
  </g>

  <g transform="translate(70 1130)">
    <rect width="500" height="210" rx="24" fill="#17352F"/>
    <text x="30" y="84" fill="#F4B037" font-family="Impact, Arial Black, sans-serif" font-size="66">MACHINE</text>
    <text x="30" y="150" fill="#F6F0E4" font-family="Impact, Arial Black, sans-serif" font-size="66">PAYS TRIBUTE</text>
  </g>
  <g transform="translate(630 1130)">
    <rect width="500" height="210" rx="24" fill="#050606"/>
    <text x="30" y="84" fill="#F6F0E4" font-family="Impact, Arial Black, sans-serif" font-size="66">REPORT</text>
    <text x="30" y="150" fill="#F4B037" font-family="Impact, Arial Black, sans-serif" font-size="66">A DEAD WALL</text>
  </g>

  <text x="70" y="1482" fill="#050606" font-family="Arial Black, Impact, sans-serif" font-size="34" letter-spacing="4">FULL CITY COLUMBUS / PROJECT-COLUMBUS / PRINT CHEAP, MOVE FAST</text>
</svg>
