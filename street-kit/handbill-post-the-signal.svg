    <text x="76" y="836" fill="#F4B037">02</text>
    <text x="130" y="836" fill="#E8DDC7">TAG A REAL PLACE.</text>
    <text x="76" y="896" fill="#F4B037">03</text>
    <text x="130" y="896" fill="#E8DDC7">NAME THE BREAK.</text>
