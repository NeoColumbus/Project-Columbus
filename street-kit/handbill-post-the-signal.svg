<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 1100" role="img" aria-labelledby="title desc">
  <title id="title">Post The Signal Handbill</title>
  <desc id="desc">A one-page handbill explaining how to join Drop 001 by posting the signal and naming a local break.</desc>
  <rect width="850" height="1100" fill="#E8DDC7"/>
  <rect x="42" y="42" width="766" height="1016" fill="#061620"/>
  <rect x="42" y="42" width="766" height="88" fill="#F4B037"/>
  <text x="70" y="98" fill="#050606" font-family="Arial Black, Impact, sans-serif" font-size="34" letter-spacing="4">DROP 001 / PUBLIC HANDOFF</text>

  <g transform="translate(425 292)">
    <circle r="132" fill="#E8DDC7"/>
    <circle r="102" fill="#061620"/>
    <path d="M-190 0h380M0-190v380" stroke="#E8DDC7" stroke-width="18"/>
    <path d="M-190 0h380M0-190v380" stroke="#B77836" stroke-width="6"/>
    <circle r="54" fill="none" stroke="#E8DDC7" stroke-width="18"/>
    <circle r="28" fill="#F4B037"/>
  </g>

  <text x="70" y="522" fill="#F4B037" font-family="Impact, Arial Black, sans-serif" font-size="84">POST THE SIGNAL.</text>
  <text x="70" y="604" fill="#E8DDC7" font-family="Impact, Arial Black, sans-serif" font-size="84">NAME THE BREAK.</text>
  <text x="70" y="686" fill="#E8DDC7" font-family="Impact, Arial Black, sans-serif" font-size="84">BUILD THE BODY.</text>

  <g font-family="Arial Black, Impact, sans-serif" font-size="26" letter-spacing="2">
    <text x="76" y="776" fill="#F4B037">01</text>
    <text x="130" y="776" fill="#E8DDC7">POST THE MARK OR A POSTER.</text>
    <text x="76" y="836" fill="#F4B037">02</text>
    <text x="130" y="836" fill="#E8DDC7">TAG ONE REAL PLACE.</text>
    <text x="76" y="896" fill="#F4B037">03</text>
    <text x="130" y="896" fill="#E8DDC7">CALL OUT ONE MISSING PIECE.</text>
    <text x="76" y="956" fill="#F4B037">04</text>
    <text x="130" y="956" fill="#E8DDC7">SEND BACK A LINE, PHOTO, OR PR.</text>
  </g>

  <rect x="42" y="994" width="766" height="64" fill="#F4B037"/>
  <text x="70" y="1036" fill="#050606" font-family="Arial Black, Impact, sans-serif" font-size="28" letter-spacing="3">github.com/NeoColumbus/Project-Columbus</text>
</svg>
