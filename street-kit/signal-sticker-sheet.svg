<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2550 3300" role="img" aria-labelledby="title desc">
  <title id="title">Second Geometry Signal Sticker Sheet</title>
  <desc id="desc">A flag and signal sticker sheet for Full City Columbus.</desc>
  <defs>
    <symbol id="flag-symbol" viewBox="0 0 1200 800">
      <rect width="1200" height="800" fill="#061620"/>
      <rect x="0" y="386" width="1200" height="28" fill="#E8DDC7"/>
      <rect x="0" y="395" width="1200" height="10" fill="#B77836"/>
      <rect x="586" y="0" width="28" height="800" fill="#E8DDC7"/>
      <rect x="595" y="0" width="10" height="800" fill="#B77836"/>
      <circle cx="600" cy="400" r="145" fill="#E8DDC7"/>
      <circle cx="600" cy="400" r="112" fill="#061620"/>
      <rect x="472" y="394" width="256" height="12" fill="#E8DDC7"/>
      <rect x="594" y="272" width="12" height="256" fill="#E8DDC7"/>
      <rect x="472" y="398" width="256" height="4" fill="#B77836"/>
      <rect x="598" y="272" width="4" height="256" fill="#B77836"/>
      <circle cx="600" cy="400" r="64" fill="none" stroke="#E8DDC7" stroke-width="18"/>
      <circle cx="600" cy="400" r="38" fill="none" stroke="#B77836" stroke-width="10"/>
      <circle cx="600" cy="400" r="28" fill="#F4B037"/>
      <circle cx="600" cy="400" r="8" fill="#E8DDC7"/>
    </symbol>
    <symbol id="signal-symbol" viewBox="0 0 800 800">
      <rect width="800" height="800" fill="#061620"/>
      <path d="M0 388h800v24H0z" fill="#E8DDC7"/>
      <path d="M388 0h24v800h-24z" fill="#E8DDC7"/>
      <path d="M0 397h800v6H0z" fill="#B77836"/>
      <path d="M397 0h6v800h-6z" fill="#B77836"/>
      <circle cx="400" cy="400" r="252" fill="#E8DDC7"/>
      <circle cx="400" cy="400" r="198" fill="#061620"/>
      <circle cx="400" cy="400" r="116" fill="none" stroke="#E8DDC7" stroke-width="34"/>
      <circle cx="400" cy="400" r="62" fill="none" stroke="#B77836" stroke-width="14"/>
      <circle cx="400" cy="400" r="40" fill="#F4B037"/>
      <circle cx="400" cy="400" r="10" fill="#E8DDC7"/>
    </symbol>
    <clipPath id="flag-cut">
      <rect width="1900" height="1267" rx="42"/>
    </clipPath>
    <clipPath id="signal-cut">
      <rect width="560" height="560" rx="42"/>
    </clipPath>
    <g id="small-signal">
      <rect width="560" height="560" rx="42" fill="#061620"/>
      <use href="#signal-symbol" width="560" height="560" clip-path="url(#signal-cut)"/>
    </g>
  </defs>
  <rect width="2550" height="3300" fill="#F6F0E4"/>
  <text x="150" y="174" fill="#050606" font-family="Arial Black, Impact, sans-serif" font-size="78" letter-spacing="5">SECOND GEOMETRY / SIGNAL SHEET</text>
  <text x="150" y="250" fill="#9D4732" font-family="Arial Black, Impact, sans-serif" font-size="34" letter-spacing="5">FLAG / MARK / BADGES / NO EXPLANATION</text>

  <g transform="translate(325 350)">
    <rect x="-30" y="-30" width="1960" height="1327" rx="60" fill="#F6F0E4" stroke="#050606" stroke-width="14"/>
    <use href="#flag-symbol" width="1900" height="1267" clip-path="url(#flag-cut)"/>
  </g>

  <g transform="translate(245 1840)">
    <rect x="-24" y="-24" width="608" height="608" rx="58" fill="#F6F0E4" stroke="#050606" stroke-width="14"/>
    <use href="#small-signal"/>
  </g>
  <g transform="translate(995 1840)">
    <rect x="-24" y="-24" width="608" height="608" rx="58" fill="#F6F0E4" stroke="#050606" stroke-width="14"/>
    <use href="#small-signal"/>
  </g>
  <g transform="translate(1745 1840)">
    <rect x="-24" y="-24" width="608" height="608" rx="58" fill="#F6F0E4" stroke="#050606" stroke-width="14"/>
    <use href="#small-signal"/>
  </g>

  <g transform="translate(245 2600)">
    <rect width="2060" height="300" rx="40" fill="#050606"/>
    <text x="92" y="132" fill="#F4B037" font-family="Impact, Arial Black, sans-serif" font-size="96">THE FIRST CITY WAS GEOMETRY.</text>
    <text x="92" y="232" fill="#E8DDC7" font-family="Impact, Arial Black, sans-serif" font-size="86">THE NEXT CITY IS US.</text>
  </g>
  <text x="150" y="3176" fill="#050606" font-family="Arial Black, Impact, sans-serif" font-size="40" letter-spacing="5">FLAG SIMPLE / STREET REPEATABLE / SOUVENIR GRADE</text>
</svg>
