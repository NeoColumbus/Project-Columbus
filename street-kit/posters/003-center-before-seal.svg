<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc">
  <title id="title">The Center Was Here Before The Seal</title>
  <desc id="desc">A Drop 001 poster reading The Center Was Here Before The Seal.</desc>
  <rect width="1080" height="1350" fill="#9D4732"/>
  <rect x="66" y="66" width="948" height="1218" fill="#E8DDC7"/>
  <rect x="66" y="66" width="948" height="188" fill="#061620"/>
  <text x="100" y="142" fill="#F4B037" font-family="Arial Black, Impact, sans-serif" font-size="34" letter-spacing="5">FULL CITY COLUMBUS / EVIDENCE 003</text>
  <text x="100" y="216" fill="#E8DDC7" font-family="Arial Black, Impact, sans-serif" font-size="28" letter-spacing="4">NOT A SEAL. A SIGNAL.</text>
  <g transform="translate(540 488)">
    <rect x="-342" y="-15" width="684" height="30" fill="#061620"/>
