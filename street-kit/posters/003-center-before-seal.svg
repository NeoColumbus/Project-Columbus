  <text x="98" y="826" fill="#050606" font-family="Impact, Arial Black, sans-serif" font-size="126">THE CENTER</text>
  <text x="98" y="954" fill="#050606" font-family="Impact, Arial Black, sans-serif" font-size="126">WAS HERE</text>
  <text x="98" y="1082" fill="#050606" font-family="Impact, Arial Black, sans-serif" font-size="126">BEFORE</text>
  <text x="98" y="1210" fill="#9D4732" font-family="Impact, Arial Black, sans-serif" font-size="126">THE SEAL</text>
  <text x="540" y="1332" text-anchor="middle" fill="#E8DDC7" font-family="Arial Black, Impact, sans-serif" font-size="19" letter-spacing="2">neocolumbus.github.io/Project-Columbus/signal</text>
