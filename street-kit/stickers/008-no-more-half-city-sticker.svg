<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2550 3300" role="img" aria-labelledby="title desc">
  <title id="title">Drop 001 No More Half-City SINGLE STICKER / NO QR</title>
  <desc id="desc">A letter-size printable page with one Drop 001 poster sticker. Poster art is inlined for GitHub-safe rendering.</desc>
  <defs>
    <clipPath id="single-poster">
      <rect width="1640" height="2050" rx="44"/>
    </clipPath>
    <g id="single-frame">
      <rect x="-48" y="-48" width="1736" height="2146" rx="74" fill="#F6F0E4"/>
      <rect x="-48" y="-48" width="1736" height="2146" rx="74" fill="none" stroke="#050606" stroke-width="18"/>
    </g>
    <g id="single-frame-qr">
      <rect x="-48" y="-48" width="1736" height="2506" rx="74" fill="#F6F0E4"/>
      <rect x="-48" y="-48" width="1736" height="2506" rx="74" fill="none" stroke="#050606" stroke-width="18"/>
    </g>
  </defs>
  <rect width="2550" height="3300" fill="#F6F0E4"/>
  <text x="150" y="194" fill="#050606" font-family="Arial Black, Impact, sans-serif" font-size="74" letter-spacing="5">DROP 001 / SINGLE STICKER / NO QR</text>
  <text x="150" y="278" fill="#9D4732" font-family="Arial Black, Impact, sans-serif" font-size="34" letter-spacing="5">NO MORE HALF-CITY</text>

  <g transform="translate(455 570)">
    <use href="#single-frame"/>
    <g clip-path="url(#single-poster)">
      <g transform="matrix(1.518519 0 0 1.518519 0.000000 0.000000)">
        <rect width="1080" height="1350" fill="#050606"/>
          <rect x="58" y="58" width="964" height="1234" fill="#061620"/>
          <rect x="58" y="58" width="964" height="104" fill="#F4B037"/>
          <text x="92" y="124" fill="#050606" font-family="Arial Black, Impact, sans-serif" font-size="34" letter-spacing="5">FULL CITY COLUMBUS</text>
          <g opacity="0.5">
            <path d="M514 260 H960 M514 398 H960 M514 536 H960 M514 674 H960 M514 812 H960 M514 950 H960" stroke="#4F8A74" stroke-width="8"/>
            <path d="M620 214 V1040 M766 214 V1040 M912 214 V1040" stroke="#4F8A74" stroke-width="8"/>
          </g>
          <g transform="translate(790 602)">
            <path d="M-260 0 H260 M0 -260 V260" stroke="#E8DDC7" stroke-width="22"/>
            <path d="M-260 0 H260 M0 -260 V260" stroke="#B77836" stroke-width="7"/>
            <circle r="174" fill="#E8DDC7"/>
            <circle r="132" fill="#061620"/>
            <circle r="76" fill="none" stroke="#E8DDC7" stroke-width="24"/>
            <circle r="40" fill="none" stroke="#B77836" stroke-width="11"/>
            <circle r="28" fill="#F4B037"/>
          </g>
          <text x="84" y="402" fill="#E8DDC7" font-family="Impact, Arial Black, sans-serif" font-size="158">NO MORE</text>
          <text x="84" y="582" fill="#F4B037" font-family="Impact, Arial Black, sans-serif" font-size="158">HALF</text>
          <text x="84" y="762" fill="#F4B037" font-family="Impact, Arial Black, sans-serif" font-size="158">CITY</text>
          <text x="88" y="1080" fill="#E8DDC7" font-family="Arial Black, Impact, sans-serif" font-size="38" letter-spacing="5">BUILD THE WHOLE BODY</text>
          <rect x="58" y="1216" width="964" height="76" fill="#F4B037"/>
          <text x="90" y="1268" fill="#050606" font-family="Arial Black, Impact, sans-serif" font-size="30" letter-spacing="4">NO MORE FRAGMENTS / DROP 001</text>
          <text x="540" y="1332" text-anchor="middle" fill="#E8DDC7" font-family="Arial Black, Impact, sans-serif" font-size="19" letter-spacing="2">neocolumbus.github.io/Project-Columbus/site/signal</text>
      </g>
    </g>
  </g>

  <text x="150" y="3148" fill="#050606" font-family="Arial Black, Impact, sans-serif" font-size="40" letter-spacing="5">PRINT ONE PAGE / CUT ONE BIG STICKER / TEST EVERY SCAN</text>
</svg>
