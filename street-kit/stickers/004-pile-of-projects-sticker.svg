<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2550 3300" role="img" aria-labelledby="title desc">
  <title id="title">Drop 001 Pile Of Projects SINGLE STICKER / NO QR</title>
  <desc id="desc">A letter-size printable page with one Drop 001 poster sticker. Poster art is inlined for GitHub-safe rendering.</desc>
  <defs>
    <clipPath id="single-poster">
      <rect width="1640" height="2050" rx="44"/>
    </clipPath>
    <g id="single-frame">
      <rect x="-48" y="-48" width="1736" height="2146" rx="74" fill="#F6F0E4"/>
      <rect x="-48" y="-48" width="1736" height="2146" rx="74" fill="none" stroke="#050606" stroke-width="18"/>
    </g>
    <g id="single-frame-qr">
      <rect x="-48" y="-48" width="1736" height="2506" rx="74" fill="#F6F0E4"/>
      <rect x="-48" y="-48" width="1736" height="2506" rx="74" fill="none" stroke="#050606" stroke-width="18"/>
    </g>
  </defs>
  <rect width="2550" height="3300" fill="#F6F0E4"/>
  <text x="150" y="194" fill="#050606" font-family="Arial Black, Impact, sans-serif" font-size="74" letter-spacing="5">DROP 001 / SINGLE STICKER / NO QR</text>
  <text x="150" y="278" fill="#9D4732" font-family="Arial Black, Impact, sans-serif" font-size="34" letter-spacing="5">PILE OF PROJECTS</text>

  <g transform="translate(455 570)">
    <use href="#single-frame"/>
    <g clip-path="url(#single-poster)">
      <g transform="matrix(1.518519 0 0 1.518519 0.000000 0.000000)">
        <rect width="1080" height="1350" fill="#F4B037"/>
          <rect x="52" y="52" width="976" height="1246" fill="#050606"/>
          <g fill="#E8DDC7">
            <rect x="102" y="112" width="196" height="156"/>
            <rect x="342" y="112" width="278" height="156"/>
            <rect x="662" y="112" width="316" height="156"/>
            <rect x="102" y="314" width="332" height="156"/>
            <rect x="480" y="314" width="182" height="156"/>
            <rect x="704" y="314" width="274" height="156"/>
          </g>
          <path d="M92 576 H988" stroke="#F4B037" stroke-width="24"/>
          <path d="M540 84 V586" stroke="#F4B037" stroke-width="16"/>
          <circle cx="540" cy="586" r="78" fill="#E8DDC7"/>
          <circle cx="540" cy="586" r="42" fill="#050606"/>
          <circle cx="540" cy="586" r="22" fill="#F4B037"/>
          <text x="92" y="762" fill="#F4B037" font-family="Impact, Arial Black, sans-serif" font-size="150">A PILE</text>
          <text x="92" y="912" fill="#E8DDC7" font-family="Impact, Arial Black, sans-serif" font-size="150">OF PROJECTS</text>
          <text x="92" y="1062" fill="#E8DDC7" font-family="Impact, Arial Black, sans-serif" font-size="150">IS NOT</text>
          <text x="92" y="1212" fill="#F4B037" font-family="Impact, Arial Black, sans-serif" font-size="150">A CITY</text>
          <text x="92" y="1272" fill="#E8DDC7" font-family="Arial Black, Impact, sans-serif" font-size="30" letter-spacing="4">MAKE THE WHOLE BODY MOVE</text>
          <text x="540" y="1332" text-anchor="middle" fill="#061620" font-family="Arial Black, Impact, sans-serif" font-size="19" letter-spacing="2">neocolumbus.github.io/Project-Columbus/site/signal</text>
      </g>
    </g>
  </g>

  <text x="150" y="3148" fill="#050606" font-family="Arial Black, Impact, sans-serif" font-size="40" letter-spacing="5">PRINT ONE PAGE / CUT ONE BIG STICKER / TEST EVERY SCAN</text>
</svg>
