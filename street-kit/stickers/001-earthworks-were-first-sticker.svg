<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2550 3300" role="img" aria-labelledby="title desc">
  <title id="title">Drop 001 Earthworks Were First SINGLE STICKER / NO QR</title>
  <desc id="desc">A letter-size printable page with one Drop 001 poster sticker. Poster art is inlined for GitHub-safe rendering.</desc>
  <defs>
    <clipPath id="single-poster">
      <rect width="1640" height="2050" rx="44"/>
    </clipPath>
    <g id="single-frame">
      <rect x="-48" y="-48" width="1736" height="2146" rx="74" fill="#F6F0E4"/>
      <rect x="-48" y="-48" width="1736" height="2146" rx="74" fill="none" stroke="#050606" stroke-width="18"/>
    </g>
    <g id="single-frame-qr">
      <rect x="-48" y="-48" width="1736" height="2506" rx="74" fill="#F6F0E4"/>
      <rect x="-48" y="-48" width="1736" height="2506" rx="74" fill="none" stroke="#050606" stroke-width="18"/>
    </g>
  </defs>
  <rect width="2550" height="3300" fill="#F6F0E4"/>
  <text x="150" y="194" fill="#050606" font-family="Arial Black, Impact, sans-serif" font-size="74" letter-spacing="5">DROP 001 / SINGLE STICKER / NO QR</text>
  <text x="150" y="278" fill="#9D4732" font-family="Arial Black, Impact, sans-serif" font-size="34" letter-spacing="5">EARTHWORKS WERE FIRST</text>

  <g transform="translate(455 570)">
    <use href="#single-frame"/>
    <g clip-path="url(#single-poster)">
      <g transform="matrix(1.518519 0 0 1.518519 0.000000 0.000000)">
        <rect width="1080" height="1350" fill="#E8DDC7"/>
          <rect x="58" y="58" width="964" height="1234" fill="#061620"/>
          <rect x="58" y="58" width="964" height="98" fill="#9D4732"/>
          <text x="92" y="121" fill="#E8DDC7" font-family="Arial Black, Impact, sans-serif" font-size="34" letter-spacing="5">DROP 001 / SECOND GEOMETRY</text>
          <g transform="translate(540 356)">
            <circle r="178" fill="#E8DDC7"/>
            <circle r="136" fill="#061620"/>
            <rect x="-258" y="-13" width="516" height="26" fill="#E8DDC7"/>
            <rect x="-13" y="-178" width="26" height="356" fill="#E8DDC7"/>
            <rect x="-258" y="-4" width="516" height="8" fill="#B77836"/>
            <rect x="-4" y="-178" width="8" height="356" fill="#B77836"/>
            <circle r="72" fill="none" stroke="#E8DDC7" stroke-width="23"/>
            <circle r="36" fill="#F4B037"/>
          </g>
          <text x="92" y="725" fill="#F4B037" font-family="Impact, Arial Black, sans-serif" font-size="150">THE</text>
          <text x="92" y="875" fill="#E8DDC7" font-family="Impact, Arial Black, sans-serif" font-size="144">EARTHWORKS</text>
          <text x="92" y="1025" fill="#E8DDC7" font-family="Impact, Arial Black, sans-serif" font-size="150">WERE</text>
          <text x="92" y="1176" fill="#F4B037" font-family="Impact, Arial Black, sans-serif" font-size="150">FIRST</text>
          <rect x="58" y="1216" width="964" height="76" fill="#F4B037"/>
          <text x="92" y="1266" fill="#050606" font-family="Arial Black, Impact, sans-serif" font-size="28" letter-spacing="3">THE NEXT CITY IS US / PROJECT-COLUMBUS</text>
          <text x="540" y="1318" text-anchor="middle" fill="#061620" font-family="Arial Black, Impact, sans-serif" font-size="17" letter-spacing="2">HOPEWELL CEREMONIAL EARTHWORKS / RAISED TWO THOUSAND YEARS BACK</text>
          <text x="540" y="1340" text-anchor="middle" fill="#061620" font-family="Arial Black, Impact, sans-serif" font-size="17" letter-spacing="2">neocolumbus.github.io/Project-Columbus/site/signal</text>
      </g>
    </g>
  </g>

  <text x="150" y="3148" fill="#050606" font-family="Arial Black, Impact, sans-serif" font-size="40" letter-spacing="5">PRINT ONE PAGE / CUT ONE BIG STICKER / TEST EVERY SCAN</text>
</svg>
