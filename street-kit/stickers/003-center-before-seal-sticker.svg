<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2550 3300" role="img" aria-labelledby="title desc">
  <title id="title">Drop 001 Center Was Here Before SINGLE STICKER / NO QR</title>
  <desc id="desc">A letter-size printable page with one Drop 001 poster sticker. Poster art is inlined for GitHub-safe rendering.</desc>
  <defs>
    <clipPath id="single-poster">
      <rect width="1640" height="2050" rx="44"/>
    </clipPath>
    <g id="single-frame">
      <rect x="-48" y="-48" width="1736" height="2146" rx="74" fill="#F6F0E4"/>
      <rect x="-48" y="-48" width="1736" height="2146" rx="74" fill="none" stroke="#050606" stroke-width="18"/>
    </g>
    <g id="single-frame-qr">
      <rect x="-48" y="-48" width="1736" height="2506" rx="74" fill="#F6F0E4"/>
      <rect x="-48" y="-48" width="1736" height="2506" rx="74" fill="none" stroke="#050606" stroke-width="18"/>
    </g>
  </defs>
  <rect width="2550" height="3300" fill="#F6F0E4"/>
  <text x="150" y="194" fill="#050606" font-family="Arial Black, Impact, sans-serif" font-size="74" letter-spacing="5">DROP 001 / SINGLE STICKER / NO QR</text>
  <text x="150" y="278" fill="#9D4732" font-family="Arial Black, Impact, sans-serif" font-size="34" letter-spacing="5">CENTER WAS HERE BEFORE</text>

  <g transform="translate(455 570)">
    <use href="#single-frame"/>
    <g clip-path="url(#single-poster)">
      <g transform="matrix(1.518519 0 0 1.518519 0.000000 0.000000)">
        <rect width="1080" height="1350" fill="#9D4732"/>
          <rect x="66" y="66" width="948" height="1218" fill="#E8DDC7"/>
          <rect x="66" y="66" width="948" height="168" fill="#061620"/>
          <text x="100" y="138" fill="#F4B037" font-family="Arial Black, Impact, sans-serif" font-size="32" letter-spacing="5">EVIDENCE 003 / CITY CENTER</text>
          <text x="100" y="204" fill="#E8DDC7" font-family="Arial Black, Impact, sans-serif" font-size="26" letter-spacing="4">NOT A SEAL. A SIGNAL.</text>
          <g transform="translate(540 454)">
            <rect x="-342" y="-15" width="684" height="30" fill="#061620"/>
            <rect x="-15" y="-282" width="30" height="560" fill="#061620"/>
            <circle r="190" fill="#E8DDC7" stroke="#061620" stroke-width="26"/>
            <circle r="132" fill="#061620"/>
            <circle r="64" fill="none" stroke="#E8DDC7" stroke-width="22"/>
            <circle r="38" fill="#F4B037"/>
          </g>
          <text x="98" y="780" fill="#050606" font-family="Impact, Arial Black, sans-serif" font-size="112">THE CENTER</text>
          <text x="98" y="902" fill="#050606" font-family="Impact, Arial Black, sans-serif" font-size="112">WAS HERE</text>
          <text x="98" y="1024" fill="#050606" font-family="Impact, Arial Black, sans-serif" font-size="112">BEFORE</text>
          <text x="98" y="1146" fill="#9D4732" font-family="Impact, Arial Black, sans-serif" font-size="112">THE SEAL</text>
          <rect x="66" y="1218" width="948" height="66" fill="#061620"/>
          <text x="540" y="1332" text-anchor="middle" fill="#E8DDC7" font-family="Arial Black, Impact, sans-serif" font-size="19" letter-spacing="2">neocolumbus.github.io/Project-Columbus/site/signal</text>
      </g>
    </g>
  </g>

  <text x="150" y="3148" fill="#050606" font-family="Arial Black, Impact, sans-serif" font-size="40" letter-spacing="5">PRINT ONE PAGE / CUT ONE BIG STICKER / TEST EVERY SCAN</text>
</svg>
