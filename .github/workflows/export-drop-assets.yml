name: Export Drop Assets

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "brand/**"
      - "drops/drop-001-second-geometry/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "site/assets/**"
      - "social-kit/**"
      - "street-kit/**"
      - "tools/export-drop-assets.cjs"

permissions:
  contents: read

jobs:
  export:
    name: Build Drop 001 PNG/PDF bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Export assets
        run: pnpm export:drop001

      - name: Upload Drop 001 bundle
        uses: actions/upload-artifact@v4
        with:
          name: drop-001-second-geometry
          path: dist/drop-001-second-geometry
