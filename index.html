<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=site/" />
    <link rel="canonical" href="site/" />
    <title>Full City Columbus</title>
    <style>
      :root {
        color-scheme: dark;
        --black: #050606;
        --bone: #f6f0e4;
        --amber: #f4b037;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100svh;
        display: grid;
        place-items: center;
        margin: 0;
        background: var(--black);
        color: var(--bone);
        font-family: Impact, Haettenschweiler, "Arial Narrow Bold", "Arial Black", sans-serif;
        text-align: center;
        text-transform: uppercase;
      }

      a {
        color: var(--amber);
      }

      h1 {
        max-width: 10ch;
        margin: 0;
        font-size: clamp(64px, 14vw, 180px);
        line-height: 0.8;
      }

      p {
        margin: 22px 0 0;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 14px;
        font-weight: 900;
        letter-spacing: 0.12em;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Full City Columbus</h1>
      <p><a href="site/">Enter the project page</a></p>
    </main>
  </body>
</html>
