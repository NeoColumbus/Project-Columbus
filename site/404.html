        box-sizing: border-box;
      }

      body {
        min-height: 100svh;
        display: grid;

        padding: 24px;

        text-align: center;
        text-transform: uppercase;
      }

      h1 {
        max-width: 12ch;
        margin: 0;
        font-size: clamp(48px, 12vw, 140px);
        line-height: 0.82;
      }

      p {
        margin: 22px 0 0;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 14px;
        font-weight: 900;
        letter-spacing: 0.12em;
