<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc">
  <title id="title">Earthwork Futurism Poster</title>
  <desc id="desc">A civic poster reading Old Ground New Machine with a Second Geometry signal mark.</desc>
  <rect width="1080" height="1350" fill="#E8DDC7"/>
  <rect x="72" y="72" width="936" height="1206" fill="#061620"/>
  <rect x="72" y="72" width="936" height="92" fill="#9D4732"/>
  <rect x="72" y="1186" width="936" height="92" fill="#F4B037"/>

  <g transform="translate(540 474)">
    <circle r="216" fill="#E8DDC7"/>
    <circle r="166" fill="#061620"/>
    <rect x="-300" y="-14" width="600" height="28" fill="#E8DDC7"/>
    <rect x="-14" y="-300" width="28" height="600" fill="#E8DDC7"/>
    <rect x="-300" y="-5" width="600" height="10" fill="#B77836"/>
    <rect x="-5" y="-300" width="10" height="600" fill="#B77836"/>
    <circle r="86" fill="none" stroke="#E8DDC7" stroke-width="28"/>
    <circle r="44" fill="#F4B037"/>
  </g>

  <text x="104" y="250" fill="#F4B037" font-family="Arial Black, Impact, sans-serif" font-size="42" letter-spacing="7">FULL CITY COLUMBUS</text>
  <text x="104" y="850" fill="#E8DDC7" font-family="Impact, Arial Black, sans-serif" font-size="156">OLD</text>
  <text x="104" y="1000" fill="#E8DDC7" font-family="Impact, Arial Black, sans-serif" font-size="156">GROUND</text>
  <text x="104" y="1148" fill="#F4B037" font-family="Impact, Arial Black, sans-serif" font-size="132">NEW MACHINE</text>
  <text x="104" y="1248" fill="#061620" font-family="Arial Black, Impact, sans-serif" font-size="30" letter-spacing="2" textLength="872" lengthAdjust="spacingAndGlyphs">THE FIRST CITY WAS GEOMETRY. THE NEXT CITY IS US.</text>
</svg>
