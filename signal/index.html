<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Signal Redirect / Full City Columbus</title>
    <meta http-equiv="refresh" content="0; url=../site/signal/" />
    <style>
      :root {
        color-scheme: dark;
        --black: #050606;
        --bone: #f6f0e4;
        --amber: #f4b037;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100svh;
        display: grid;
        place-items: center;
        margin: 0;
        padding: 24px;
        background: var(--black);
        color: var(--bone);
        font-family: Impact, Haettenschweiler, "Arial Narrow Bold", "Arial Black", sans-serif;
        text-align: center;
        text-transform: uppercase;
      }

      p {
        max-width: 22rem;
        margin: 0;
        font-size: clamp(42px, 10vw, 96px);
        line-height: 0.86;
      }

      a {
        color: var(--amber);
      }
    </style>
    <script>
      (function () {
        var target = new URL("../site/signal/", window.location.href);
        target.search = window.location.search;
        target.hash = window.location.hash || "#field-card";
        window.location.replace(target.href);
      })();
    </script>
  </head>
  <body>
    <p>
      Signal moving.
      <br />
      <a href="../site/signal/">Open signal</a>
    </p>
  </body>
</html>
